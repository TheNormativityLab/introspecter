site_name: Introspecter
theme:
  name: material
  features:
    - content.code.copy
    - content.code.select
    - navigation.path
    - navigation.sections
    - navigation.expand
    - content.code.annotate
    - content.tabs.link
    - navigation.instant
    - navigation.tracking
    - navigation.top
  palette:
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode        
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Introduction: index.md
  - Tutorials:
      - tutorials/basic_debate.md
      - tutorials/debugger.md
      - tutorials/argumentative_debate.md
      - tutorials/debate_annotation.md
  - Installation:
      - installation/local_setup.md
      - installation/configuration.md
      - installation/database.md

repo_name: Introspecter
repo_url: https://github.com/TheNormativityLab/introspecter

plugins:
  - search
  - mkdocs-video:
      is_video: True
      video_muted: True
      video_controls: True
  - mkdocstrings:
      handlers:
        python:
          paths: ["docent/data_models"]
          selection:
            docstring_style: google
          options:
            signature_crossrefs: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            heading_level: 2
            inherited_members: true
            show_root_heading: true
            show_root_full_path: true
            show_object_full_path: false
            show_category_heading: false

extra:
  generator: false
  language: en
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/TheNormativityLab/introspecter

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - scripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

extra_css:
  - styles/extra.css