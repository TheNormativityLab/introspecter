# check https://docs.litellm.ai/docs/routing for more details on how to configure multiple endpoints

language_models:
  - model_name: "gpt-5"
    litellm_params:
      model: "openrouter/openai/gpt-5"
      timeout: 300
      num_retries: 7
      rpm: 1000

completion_params:
  # temperature: 0.1
  # top_p: 0.9
  # Reasoning models share max_completion_tokens between reasoning + visible
  # output. See gpt_5_nano.yaml for notes on reasoning_effort.
  max_completion_tokens: 4096
  reasoning_effort: "low"
