language_models:
  - model_name: qwen3.5-9b
    litellm_params:
      model: openrouter/qwen/qwen3.5-9b
      timeout: 300
      num_retries: 5
# Total context window (input + output); vLLM often uses 40960 for this model
# max_context_tokens: 40960

completion_params:
  max_completion_tokens: 4096
  temperature: 0.7
  top_p: 0.8
  presence_penalty: 1.5
  extra_body:
    reasoning:
      enabled: false

    top_k: 20
