# gpt-4o-mini via the OpenAI API directly.
# Routes through litellm using OPENAI_API_KEY (not OpenRouter).
# litellm provider docs: https://docs.litellm.ai/docs/providers/openai

language_models:
  - model_name: "gpt-4o-mini"
    litellm_params:
      model: "openrouter/openai/gpt-4o-mini"
      timeout: 300
      num_retries: 5
      rpm: 1000

completion_params:
  max_tokens: 4096
